<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, sans-serif">
  <style>
    .wf-panel { fill: none; stroke: #4A4A55; stroke-width: 1.5; }
    .wf-card { fill: #FFFFFF; stroke: #8A8A98; stroke-width: 1.2; rx: 4; }
    .wf-label { font-size: 11px; fill: #8A8A98; letter-spacing: 0.5px; }
    .wf-heading { font-size: 12px; fill: #5A5A68; font-weight: 600; letter-spacing: 1px; }
    .wf-bubble { fill: #ECEAFB; stroke: #8A7FE0; stroke-width: 1.2; }
    .wf-bubble-text { font-size: 9px; fill: #5A50A8; text-anchor: middle; }
    .wf-toggle { fill: none; stroke: #4A4A55; stroke-width: 1.2; rx: 14; }
    .wf-toggle-active { fill: #2A2A32; }
  </style>

  <rect width="900" height="460" fill="#FAFAF9"/>
  <text x="20" y="28" class="wf-label" font-weight="600" letter-spacing="1">SORT — INBOX / TAGS</text>

  <!-- outer frame -->
  <rect x="20" y="44" width="860" height="360" rx="10" class="wf-panel"/>
  <line x1="380" y1="44" x2="380" y2="404" stroke="#4A4A55" stroke-width="1.2"/>

  <!-- left: inbox grid -->
  <text x="44" y="72" class="wf-heading">INBOX</text>
  <g>
    <!-- 4x5 grid of note cards -->
    <rect x="44" y="88" width="60" height="44" class="wf-card"/>
    <rect x="116" y="88" width="60" height="44" class="wf-card"/>
    <rect x="188" y="88" width="60" height="44" class="wf-card"/>
    <rect x="260" y="88" width="60" height="44" class="wf-card"/>

    <rect x="44" y="144" width="60" height="44" class="wf-card"/>
    <rect x="116" y="144" width="60" height="44" class="wf-card"/>
    <rect x="188" y="144" width="60" height="44" class="wf-card"/>
    <rect x="260" y="144" width="60" height="44" class="wf-card"/>

    <rect x="44" y="200" width="60" height="44" class="wf-card"/>
    <rect x="116" y="200" width="60" height="44" class="wf-card"/>
    <rect x="188" y="200" width="60" height="44" class="wf-card"/>
    <rect x="260" y="200" width="60" height="44" class="wf-card"/>

    <rect x="44" y="256" width="60" height="44" class="wf-card"/>
    <rect x="116" y="256" width="60" height="44" class="wf-card"/>
  </g>
  <text x="44" y="390" class="wf-label">drag a card onto a tag bubble to apply it →</text>

  <!-- right: tag frequency bubbles -->
  <text x="404" y="72" class="wf-heading">TAGS — sized by frequency</text>
  <g>
    <circle cx="630" cy="220" r="58" class="wf-bubble"/>
    <text x="630" y="223" class="wf-bubble-text" font-size="11">client-x</text>

    <circle cx="510" cy="130" r="20" class="wf-bubble"/>
    <text x="510" y="133" class="wf-bubble-text">ideas</text>

    <circle cx="740" cy="120" r="26" class="wf-bubble"/>
    <text x="740" y="123" class="wf-bubble-text">film</text>

    <circle cx="500" cy="290" r="32" class="wf-bubble"/>
    <text x="500" y="293" class="wf-bubble-text">draft</text>

    <circle cx="760" cy="300" r="16" class="wf-bubble"/>
    <text x="760" y="303" class="wf-bubble-text" font-size="8">misc</text>

    <circle cx="440" cy="200" r="10" class="wf-bubble"/>
  </g>
  <text x="404" y="390" class="wf-label">larger bubble = used on more notes (computed, not stored)</text>

  <!-- bottom toolbar -->
  <rect x="20" y="420" width="860" height="34" rx="17" class="wf-toggle"/>
  <circle cx="44" cy="437" r="9" class="wf-panel"/>
  <line x1="40" y1="437" x2="48" y2="437" stroke="#4A4A55" stroke-width="1.3"/>
  <line x1="44" y1="433" x2="44" y2="441" stroke="#4A4A55" stroke-width="1.3"/>
  <text x="100" y="441" class="wf-bubble-text" fill="#8A8A98" font-size="10">CAPTURE</text>
  <rect x="240" y="423" width="100" height="28" rx="14" class="wf-toggle-active"/>
  <text x="290" y="441" class="wf-bubble-text" fill="#fff" font-size="10">SORT</text>
  <text x="450" y="441" class="wf-bubble-text" fill="#8A8A98" font-size="10">LAYER</text>
  <text x="620" y="441" class="wf-bubble-text" fill="#8A8A98" font-size="10">TRACK</text>
  <text x="790" y="441" class="wf-bubble-text" fill="#8A8A98" font-size="10">SHARE</text>

</svg>