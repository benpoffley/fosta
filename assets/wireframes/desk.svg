<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, sans-serif">
  <style>
    .wf-panel { fill: none; stroke: #4A4A55; stroke-width: 1.5; }
    .wf-label { font-size: 11px; fill: #8A8A98; letter-spacing: 0.5px; }
    .wf-node { fill: #FFFFFF; stroke: #4A4A55; stroke-width: 1.3; }
    .wf-ref { fill: #ECEAFB; stroke: #8A7FE0; stroke-width: 1.3; }
    .wf-tilde { stroke: #6A6A78; stroke-width: 1.7; fill: none; stroke-linecap: round; }
    .wf-tb-label { font-size: 10px; fill: #8A8A98; text-anchor: middle; }
  </style>
  <defs>
    <marker id="barrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#B8B8C5"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#FAFAF9"/>
  <text x="20" y="28" class="wf-label" font-weight="600" letter-spacing="1">BASE / DESK — SCRATCHPAD + CAPTURE BAR</text>

  <!-- main canvas area -->
  <rect x="20" y="44" width="860" height="360" rx="10" class="wf-panel"/>

  <!-- timer pill centre-top -->
  <rect x="355" y="58" width="190" height="28" rx="14" fill="#FFFFFF" stroke="#4A4A55" stroke-width="1.3"/>
  <circle cx="374" cy="72" r="6" class="wf-panel"/>
  <path d="M374,68 v4 l3,2" stroke="#4A4A55" stroke-width="1.2" fill="none"/>
  <text x="388" y="77" class="wf-label" font-size="9">24h · WIPE NOW · HISTORY</text>

  <!-- freeform node 1 -->
  <rect x="60" y="110" width="150" height="56" rx="5" class="wf-node"/>
  <path d="M74,126 h60" class="wf-tilde"/>
  <path d="M74,140 h90" class="wf-tilde"/>
  <path d="M74,154 h50" class="wf-tilde"/>

  <!-- freeform node 2 -->
  <rect x="260" y="170" width="130" height="68" rx="5" class="wf-node"/>
  <path d="M274,188 h70" class="wf-tilde"/>
  <path d="M274,202 h55" class="wf-tilde"/>
  <path d="M274,216 h40" class="wf-tilde"/>

  <!-- note-reference node (purple = linked to real note in library) -->
  <rect x="530" y="120" width="170" height="60" rx="5" class="wf-ref"/>
  <text x="543" y="140" class="wf-label" font-size="9" fill="#5A50A8">Documentary.md</text>
  <line x1="543" y1="150" x2="682" y2="150" stroke="#8A7FE0" stroke-width="1"/>
  <text x="543" y="166" class="wf-label" font-size="8" fill="#7A70C8">uuid: 550e8400…</text>

  <!-- conversion arrow from freeform to ref node -->
  <path d="M380,200 C460,190 490,170 525,150" stroke="#B8B8C5" stroke-width="1.5" fill="none" marker-end="url(#barrow)"/>
  <text x="290" y="232" class="wf-label" font-size="8">"Capture to Inbox" converts freeform node in-place to a UUID reference card</text>

  <!-- freeform node 3 -->
  <rect x="700" y="230" width="120" height="52" rx="5" class="wf-node"/>
  <path d="M714,248 h50" class="wf-tilde"/>
  <path d="M714,262 h30" class="wf-tilde"/>

  <!-- freeform node 4 -->
  <rect x="80" y="268" width="160" height="60" rx="5" class="wf-node"/>
  <path d="M94,284 h80" class="wf-tilde"/>
  <path d="M94,298 h60" class="wf-tilde"/>
  <path d="M94,312 h100" class="wf-tilde"/>

  <text x="36" y="362" class="wf-label" font-size="9">canvas-only content · freeform nodes and note-reference UUID cards</text>
  <text x="36" y="378" class="wf-label" font-size="9">archives on timer · history mode: amber border + read-only</text>

  <!-- persistent capture bar inside canvas, bottom -->
  <rect x="220" y="392" width="460" height="36" rx="18" fill="#FFFFFF" stroke="#4A4A55" stroke-width="1.3"/>
  <line x1="242" y1="410" x2="250" y2="410" stroke="#4A4A55" stroke-width="1.5"/>
  <line x1="246" y1="406" x2="246" y2="414" stroke="#4A4A55" stroke-width="1.5"/>
  <path d="M262,410 h60" class="wf-tilde" stroke-width="1.4"/>
  <text x="650" y="414" class="wf-label" font-size="8">always visible here</text>

  <!-- bottom toolbar -->
  <rect x="20" y="444" width="860" height="34" rx="17" class="wf-panel"/>
  <rect x="36" y="447" width="90" height="28" rx="14" fill="#2A2A32"/>
  <text x="81" y="466" class="wf-tb-label" fill="#ffffff">BASE</text>
  <text x="278" y="466" class="wf-tb-label">SORT</text>
  <text x="450" y="466" class="wf-tb-label">LAYER</text>
  <text x="622" y="466" class="wf-tb-label">TRACK</text>
  <text x="794" y="466" class="wf-tb-label">SHARE</text>

</svg>