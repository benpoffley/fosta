<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, sans-serif">
  <style>
    .wf-panel { fill: none; stroke: #4A4A55; stroke-width: 1.5; }
    .wf-label { font-size: 11px; fill: #8A8A98; letter-spacing: 0.5px; }
    .wf-heading { font-size: 12px; fill: #5A5A68; font-weight: 600; letter-spacing: 1px; }
    .wf-tilde { stroke: #6A6A78; stroke-width: 1.6; fill: none; stroke-linecap: round; }
    .wf-row { fill: #F2F1F5; stroke: #C5C5D0; stroke-width: 1; rx: 4; }
    .wf-row-active { fill: #ECEAFB; stroke: #8A7FE0; }
    .wf-tab { fill: #FFFFFF; stroke: #C5C5D0; stroke-width: 1; }
    .wf-tab-active { fill: #2A2A32; }
    .wf-line { stroke: #D5D5DC; stroke-width: 1.2; }
    .wf-comment { fill: #FFF8E8; stroke: #E0B85A; stroke-width: 1; rx: 4; }
  </style>

  <rect width="900" height="460" fill="#FAFAF9"/>
  <text x="20" y="28" class="wf-label" font-weight="600" letter-spacing="1">LAYER — THREE PANEL LAYOUT</text>

  <rect x="20" y="44" width="860" height="370" rx="10" class="wf-panel"/>
  <line x1="210" y1="44" x2="210" y2="414" stroke="#4A4A55" stroke-width="1.2"/>
  <line x1="660" y1="44" x2="660" y2="414" stroke="#4A4A55" stroke-width="1.2"/>

  <!-- LEFT: file navigator -->
  <text x="36" y="68" class="wf-heading" font-size="10">FILES</text>
  <rect x="36" y="80" width="158" height="22" rx="4" class="wf-tab"/>
  <text x="44" y="95" class="wf-label" font-size="9">🔍 search vault</text>

  <rect x="36" y="112" width="158" height="18" class="wf-row"/>
  <text x="44" y="125" class="wf-label" font-size="9">▾ Projects</text>
  <rect x="48" y="134" width="146" height="16" class="wf-row-active"/>
  <text x="56" y="146" class="wf-label" font-size="9" fill="#5A50A8">Documentary.md</text>
  <rect x="48" y="154" width="146" height="16" class="wf-row"/>
  <text x="56" y="166" class="wf-label" font-size="9">Treatment.md</text>
  <rect x="36" y="176" width="158" height="18" class="wf-row"/>
  <text x="44" y="189" class="wf-label" font-size="9">▾ Inbox</text>
  <rect x="48" y="198" width="146" height="16" class="wf-row"/>
  <text x="56" y="210" class="wf-label" font-size="9">Untitled-04.md</text>
  <rect x="48" y="218" width="146" height="16" class="wf-row"/>
  <text x="56" y="230" class="wf-label" font-size="9">Untitled-05.md</text>

  <!-- CENTRE: editor with tabs -->
  <rect x="222" y="56" width="426" height="26" rx="4" class="wf-panel"/>
  <rect x="226" y="60" width="110" height="18" class="wf-tab-active" rx="3"/>
  <text x="234" y="73" class="wf-label" fill="#fff" font-size="9">Documentary.md ×</text>
  <rect x="340" y="60" width="100" height="18" class="wf-tab" rx="3"/>
  <text x="348" y="73" class="wf-label" font-size="9">Treatment.md</text>

  <!-- editor body -->
  <path d="M236,108 h36" class="wf-tilde" stroke-width="2.2"/>
  <line x1="236" y1="128" x2="640" y2="128" class="wf-line"/>
  <line x1="236" y1="144" x2="600" y2="144" class="wf-line"/>
  <line x1="236" y1="160" x2="620" y2="160" class="wf-line"/>
  <text x="236" y="184" class="wf-label" font-size="9" fill="#9A9AA5">/ type to insert a block…</text>
  <line x1="236" y1="206" x2="560" y2="206" class="wf-line"/>
  <line x1="236" y1="222" x2="610" y2="222" class="wf-line"/>

  <!-- highlighted block being commented on -->
  <rect x="232" y="234" width="412" height="20" rx="3" fill="#ECEAFB" stroke="#8A7FE0" stroke-width="1"/>
  <line x1="240" y1="244" x2="500" y2="244" stroke="#5A50A8" stroke-width="1.2"/>
  <text x="510" y="248" class="wf-label" font-size="8" fill="#5A50A8">‹!-- id:8e2c --›</text>

  <line x1="236" y1="270" x2="640" y2="270" class="wf-line"/>
  <line x1="236" y1="286" x2="600" y2="286" class="wf-line"/>

  <!-- RIGHT: layers panel -->
  <text x="676" y="68" class="wf-heading" font-size="10">LAYERS</text>
  <text x="676" y="86" class="wf-label" font-size="9">METADATA</text>
  <line x1="676" y1="94" x2="876" y2="94" class="wf-line"/>
  <text x="676" y="108" class="wf-label" font-size="8">created · modified</text>
  <rect x="676" y="116" width="34" height="14" rx="7" class="wf-row"/>
  <text x="684" y="126" class="wf-label" font-size="7">film</text>
  <rect x="714" y="116" width="44" height="14" rx="7" class="wf-row"/>
  <text x="722" y="126" class="wf-label" font-size="7">client-x</text>

  <text x="676" y="152" class="wf-label" font-size="9">BACKLINKS</text>
  <line x1="676" y1="160" x2="876" y2="160" class="wf-line"/>
  <text x="676" y="174" class="wf-label" font-size="8">← Treatment.md</text>
  <text x="676" y="188" class="wf-label" font-size="8">← Interview-notes.md</text>

  <text x="676" y="214" class="wf-label" font-size="9">SELECTED BLOCK</text>
  <line x1="676" y1="222" x2="876" y2="222" class="wf-line"/>
  <rect x="676" y="232" width="184" height="48" class="wf-comment"/>
  <path d="M684,246 h60" class="wf-tilde" stroke="#A88634"/>
  <path d="M684,260 h40" class="wf-tilde" stroke="#A88634"/>
  <text x="676" y="294" class="wf-label" font-size="8">+ add comment</text>

  <!-- bottom toolbar -->
  <rect x="20" y="424" width="860" height="34" rx="17" class="wf-panel"/>
  <circle cx="44" cy="441" r="9" class="wf-panel"/>
  <line x1="40" y1="441" x2="48" y2="441" stroke="#4A4A55" stroke-width="1.3"/>
  <line x1="44" y1="437" x2="44" y2="445" stroke="#4A4A55" stroke-width="1.3"/>
  <text x="100" y="445" class="wf-label" font-size="10">CAPTURE</text>
  <text x="280" y="445" class="wf-label" font-size="10">SORT</text>
  <rect x="420" y="427" width="148" height="28" rx="14" fill="#2A2A32"/>
  <text x="460" y="445" class="wf-label" fill="#fff" font-size="10">LAYER</text>
  <text x="620" y="445" class="wf-label" font-size="10">TRACK</text>
  <text x="790" y="445" class="wf-label" font-size="10">SHARE</text>

</svg>